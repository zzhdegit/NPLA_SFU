<svg width="900" height="600" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="900" height="600" fill="#ffffff" rx="10"/>
    
    <!-- Title -->
    <text x="450" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#000000">SFU 硬件架构：槽位(Slot)与内部寄存器映射关系</text>

    <!-- Part 1: Slot Array (The Container) -->
    <g transform="translate(50, 100)">
        <text x="0" y="-15" font-family="Arial" font-size="16" font-weight="bold" fill="#000000">1. 多槽位配置阵列 (4-Slot Array)</text>
        <rect x="0" y="0" width="220" height="400" fill="none" stroke="black" stroke-width="2" rx="5"/>
        
        <!-- Slot 0 -->
        <rect x="10" y="10" width="200" height="85" fill="#f8f9fa" stroke="black" stroke-width="1.5"/>
        <text x="110" y="58" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Slot 0 (Active)</text>
        
        <!-- Slot 1 (Expanded) -->
        <rect x="10" y="105" width="200" height="85" fill="#e8f4f8" stroke="black" stroke-width="2.5"/>
        <text x="110" y="153" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Slot 1 (Loading...)</text>
        
        <!-- Slot 2 -->
        <rect x="10" y="200" width="200" height="85" fill="#f8f9fa" stroke="black" stroke-width="1.5"/>
        <text x="110" y="248" font-family="Arial" font-size="14" font-weight="bold" text-anchor="middle">Slot 2</text>
        
        <!-- Slot 3 -->
        <rect x="10" y="295" width="200" height="85" fill="#f8f9fa" stroke="black" stroke-width="1.5" stroke-dasharray="5,3"/>
        <text x="110" y="343" font-family="Arial" font-size="14" text-anchor="middle" fill="#6c757d">Slot 3 (Reserved)</text>
    </g>

    <!-- Inclusion Relationship Lines (Dashed) -->
    <path d="M210 105 L450 80" stroke="black" stroke-width="1" stroke-dasharray="5,5" fill="none"/>
    <path d="M210 190 L450 500" stroke="black" stroke-width="1" stroke-dasharray="5,5" fill="none"/>

    <!-- Part 2: Internal Memory Map of ONE Slot -->
    <g transform="translate(450, 80)">
        <text x="0" y="-15" font-family="Arial" font-size="16" font-weight="bold" fill="#000000">2. 单个槽位内部逻辑映射 (Internal Slot Structure)</text>
        
        <!-- Container Box -->
        <rect x="0" y="0" width="350" height="420" fill="white" stroke="black" stroke-width="2" rx="5"/>
        
        <!-- 32x Boundaries -->
        <rect x="20" y="20" width="310" height="100" fill="#cce5ff" stroke="black" stroke-width="1.5"/>
        <text x="175" y="65" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">0x00 - 0x1F:</text>
        <text x="175" y="85" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">32x Boundaries</text>
        
        <!-- Gap -->
        <rect x="20" y="120" width="310" height="25" fill="#e2e3e5" stroke="black" stroke-width="1" stroke-dasharray="4,2"/>
        <text x="175" y="138" font-family="Monospace" font-size="11" text-anchor="middle">0x20: Reserved Gap</text>
        
        <!-- 32x Slopes -->
        <rect x="20" y="145" width="310" height="90" fill="#d4edda" stroke="black" stroke-width="1.5"/>
        <text x="175" y="185" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">0x21 - 0x40:</text>
        <text x="175" y="205" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">32x Slope (a)</text>
        
        <!-- 32x Intercepts -->
        <rect x="20" y="235" width="310" height="90" fill="#fff3cd" stroke="black" stroke-width="1.5"/>
        <text x="175" y="275" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">0x41 - 0x60:</text>
        <text x="175" y="295" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">32x Intercept (b)</text>
        
        <!-- Global Ctrl -->
        <rect x="20" y="325" width="310" height="75" fill="#e1bee7" stroke="black" stroke-width="1.5"/>
        <text x="175" y="360" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">0x61 - 0x64:</text>
        <text x="175" y="380" font-family="Monospace" font-size="14" font-weight="bold" text-anchor="middle">Global Control (Sat/Shift)</text>
    </g>

    <!-- Legend -->
    <text x="450" y="550" font-family="Arial" font-size="12" text-anchor="middle" fill="#555" font-style="italic">
        示意图：展示 Slot 1 被展开后的具体寄存器分配。所有 4 个 Slot 拥有完全一致的内部映射逻辑。
    </text>
</svg>
